name: CI

on:
  pull_request:
    branches:
      - master

# Cancel superseded runs on the same PR to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # Needed to clone the repository

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true # Cache deps keyed off the lockfile

      - name: Install fresh deps
        run: deno install --allow-scripts

      - name: Lint revision
        run: deno task check

      - name: Build step
        run: deno task build --debug -l warn
